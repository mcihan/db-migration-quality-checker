version: '3.8'

# Run from the docker/ directory:
#   docker compose up --build
# The build context is the project root so the Dockerfile can access src/ and pom.xml.

services:
  db-migration-quality-checker:
    container_name: db-migration-quality-checker
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      # source + target are DB-agnostic: set SOURCE_TYPE / TARGET_TYPE to
      # either DB2 or MYSQL. The app picks the right JDBC driver automatically.
      - SOURCE_TYPE=DB2
      - SOURCE_JDBC_URL=jdbc:db2://host.docker.internal:50000/SOURCEDB
      - SOURCE_USERNAME=db2user
      - SOURCE_PASSWORD=changeme

      - TARGET_TYPE=MYSQL
      - TARGET_JDBC_URL=jdbc:mysql://host.docker.internal:3306/TARGETDB
      - TARGET_USERNAME=mysqluser
      - TARGET_PASSWORD=changeme

      - ONLY_RUN_ROW_COUNT=false
      - ONLY_COLUMN_METADATA=false
      - ONLY_RANDOM_DATA=false

      - RANDOM_DATA_COUNT=10000
    volumes:
      - ../data:/app/data
      - ../report:/app/report
