name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Derive version from tag
        id: ver
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set Maven project version
        run: ./mvnw -B -ntp versions:set -DnewVersion=${{ steps.ver.outputs.version }} -DgenerateBackupPoms=false

      - name: Build jar (tests run on CI already)
        run: ./mvnw -B -ntp package -DskipTests

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          awk -v ver="${{ steps.ver.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${{ steps.ver.outputs.version }}" > RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: target/*.jar
