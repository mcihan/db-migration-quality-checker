name: Integration Tests (DB2 + MySQL)

on:
  schedule:
    # Nightly at 03:00 UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  full-it:
    # Only run automatically on schedule/dispatch, or on PRs explicitly labelled "run-it".
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-it')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Enable Testcontainers reuse
        run: echo "testcontainers.reuse.enable=true" >> $HOME/.testcontainers.properties

      - name: Run full integration suite (includes DB2)
        run: ./mvnw -B -ntp verify -Dgroups=integration

      - name: Upload Failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/
