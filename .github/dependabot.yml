version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - maven
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
      testcontainers:
        patterns:
          - "org.testcontainers:*"
    ignore:
      # Spring Boot 4.x requires a manual migration (Jakarta EE 11 baseline).
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      # Spotless 3.x has breaking config changes.
      - dependency-name: "com.diffplug.spotless:*"
        update-types: ["version-update:semver-major"]
      # Hold major bumps of commonly-disruptive plugins for manual review.
      - dependency-name: "org.apache.maven.plugins:maven-*-plugin"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    # Major bumps of actions frequently rename inputs or change behaviour —
    # review them manually rather than auto-merging.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    # Stay on Temurin 21 until we explicitly bump the project's Java target.
    ignore:
      - dependency-name: "eclipse-temurin"
        update-types: ["version-update:semver-major"]
